name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.163.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.163.3'
          extended: true
      - name: Get Hugo Modules
        run: |
          cd website && hugo mod get
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ github.workspace }}/.hugo_cache
        run: |
          cd website && hugo --gc --minify
      - name: Upload artifact
        uses: actions/upload-pages-art

