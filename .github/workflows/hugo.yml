Der Push ist fehlgeschlagen — das GitHub Token hat keine `workflow` Berechtigung. Das ist ein bekanntes GitHub-Sicherheitsfeature: Workflow-Dateien können nur mit einem speziellen `workflow`-Scope erstellt/aktualisiert werden.

**Zwei schnelle Lösungen:**

## Lösung A: Workflow-File manuell in GitHub erstellen (am schnellsten)

1. Geh zu deinem Repo: https://github.com/KomposTobi/RegenerativeLandschaftsGestaltung
2. Klick auf **"Add file"** → **"Create new file"**
3. Als Dateiname eingeben: `.github/workflows/hugo.yml`
