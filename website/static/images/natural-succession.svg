<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200">
  <defs>
    <style>
      .title { font: bold 24px sans-serif; fill: #1a1a1a; }
      .subtitle { font: 18px sans-serif; fill: #4a4a4a; }
      .label { font: 14px sans-serif; fill: #333; }
      .small { font: 12px sans-serif; fill: #666; }
      .stage-title { font: bold 16px sans-serif; fill: #2d5016; }
    </style>
  </defs>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" class="title">Natürliche Sukzession</text>
  <text x="400" y="65" text-anchor="middle" class="subtitle">Von blankem Fels zum Klimaxwald</text>
  
  <!-- Stage 1: Bare Rock -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="700" height="150" fill="#f5f5f5" stroke="#ccc" stroke-width="2" rx="5"/>
    <text x="350" y="25" text-anchor="middle" class="stage-title">Stadium 1: Pionierphase (0-10 Jahre)</text>
    
    <!-- Bare rock -->
    <path d="M 50 120 L 150 100 L 250 110 L 350 95 L 450 105 L 550 100 L 650 110" fill="none" stroke="#888" stroke-width="3"/>
    
    <!-- Lichen/moss -->
    <circle cx="100" cy="108" r="5" fill="#9acd32"/>
    <circle cx="200" cy="105" r="4" fill="#9acd32"/>
    <circle cx="300" cy="102" r="5" fill="#9acd32"/>
    <circle cx="400" cy="100" r="4" fill="#9acd32"/>
    
    <!-- Labels -->
    <text x="350" y="140" text-anchor="middle" class="small">Flechten und Moose zersetzen Gestein → erste Bodenbildung</text>
  </g>
  
  <!-- Stage 2: Grasses and Herbs -->
  <g transform="translate(50, 270)">
    <rect x="0" y="0" width="700" height="150" fill="#f5f5f5" stroke="#ccc" stroke-width="2" rx="5"/>
    <text x="350" y="25" text-anchor="middle" class="stage-title">Stadium 2: Gras- und Krautphase (10-30 Jahre)</text>
    
    <!-- Soil layer -->
    <path d="M 50 120 L 650 120" fill="none" stroke="#8b6f47" stroke-width="4"/>
    
    <!-- Grasses -->
    <g transform="translate(80, 80)">
      <line x1="0" y1="40" x2="0" y2="20" stroke="#2d5016" stroke-width="2"/>
      <line x1="5" y1="40" x2="5" y2="15" stroke="#2d5016" stroke-width="2"/>
      <line x1="10" y1="40" x2="10" y2="25" stroke="#2d5016" stroke-width="2"/>
    </g>
    <g transform="translate(150, 85)">
      <line x1="0" y1="35" x2="0" y2="15" stroke="#2d5016" stroke-width="2"/>
      <line x1="5" y1="35" x2="5" y2="10" stroke="#2d5016" stroke-width="2"/>
    </g>
    <g transform="translate(250, 80)">
      <line x1="0" y1="40" x2="0" y2="20" stroke="#2d5016" stroke-width="2"/>
      <line x1="5" y1="40" x2="5" y2="15" stroke="#2d5016" stroke-width="2"/>
      <line x1="10" y1="40" x2="10" y2="25" stroke="#2d5016" stroke-width="2"/>
    </g>
    <g transform="translate(400, 85)">
      <line x1="0" y1="35" x2="0" y2="15" stroke="#2d5016" stroke-width="2"/>
      <line x1="5" y1="35" x2="5" y2="10" stroke="#2d5016" stroke-width="2"/>
    </g>
    <g transform="translate(550, 80)">
      <line x1="0" y1="40" x2="0" y2="20" stroke="#2d5016" stroke-width="2"/>
      <line x1="5" y1="40" x2="5" y2="15" stroke="#2d5016" stroke-width="2"/>
    </g>
    
    <!-- Flowers -->
    <circle cx="120" cy="90" r="4" fill="#ff6b9d"/>
    <circle cx="320" cy="85" r="4" fill="#ffd700"/>
    <circle cx="480" cy="90" r="4" fill="#ff6b9d"/>
    
    <!-- Labels -->
    <text x="350" y="140" text-anchor="middle" class="small">Gräser und Kräuter bauen organische Substanz auf → Bodenaufbau</text>
  </g>
  
  <!-- Stage 3: Shrubs -->
  <g transform="translate(50, 440)">
    <rect x="0" y="0" width="700" height="150" fill="#f5f5f5" stroke="#ccc" stroke-width="2" rx="5"/>
    <text x="350" y="25" text-anchor="middle" class="stage-title">Stadium 3: Strauchphase (30-60 Jahre)</text>
    
    <!-- Soil -->
    <path d="M 50 120 L 650 120" fill="none" stroke="#8b6f47" stroke-width="4"/>
    
    <!-- Shrubs -->
    <g transform="translate(100, 60)">
      <line x1="0" y1="60" x2="0" y2="30" stroke="#4a2" stroke-width="3"/>
      <ellipse cx="0" cy="30" rx="20" ry="25" fill="#2d5016"/>
    </g>
    <g transform="translate(250, 65)">
      <line x1="0" y1="55" x2="0" y2="25" stroke="#4a2" stroke-width="3"/>
      <ellipse cx="0" cy="25" rx="18" ry="22" fill="#2d5016"/>
    </g>
    <g transform="translate(400, 60)">
      <line x1="0" y1="60" x2="0" y2="30" stroke="#4a2" stroke-width="3"/>
      <ellipse cx="0" cy="30" rx="22" ry="28" fill="#2d5016"/>
    </g>
    <g transform="translate(550, 65)">
      <line x1="0" y1="55" x2="0" y2="25" stroke="#4a2" stroke-width="3"/>
      <ellipse cx="0" cy="25" rx="20" ry="24" fill="#2d5016"/>
    </g>
    
    <!-- Small trees starting -->
    <g transform="translate(180, 50)">
      <line x1="0" y1="70" x2="0" y2="40" stroke="#4a2" stroke-width="4"/>
      <ellipse cx="0" cy="40" rx="12" ry="15" fill="#2d5016"/>
    </g>
    <g transform="translate(480, 50)">
      <line x1="0" y1="70" x2="0" y2="40" stroke="#4a2" stroke-width="4"/>
      <ellipse cx="0" cy="40" rx="12" ry="15" fill="#2d5016"/>
    </g>
    
    <!-- Labels -->
    <text x="350" y="140" text-anchor="middle" class="small">Sträucher beschatten den Boden, schaffen Mikroklima für Bäume</text>
  </g>
  
  <!-- Stage 4: Young Forest -->
  <g transform="translate(50, 610)">
    <rect x="0" y="0" width="700" height="150" fill="#f5f5f5" stroke="#ccc" stroke-width="2" rx="5"/>
    <text x="350" y="25" text-anchor="middle" class="stage-title">Stadium 4: Jungwald (60-100 Jahre)</text>
    
    <!-- Soil -->
    <path d="M 50 120 L 650 120" fill="none" stroke="#8b6f47" stroke-width="4"/>
    
    <!-- Young trees -->
    <g transform="translate(80, 30)">
      <line x1="0" y1="90" x2="0" y2="40" stroke="#4a2" stroke-width="5"/>
      <ellipse cx="0" cy="40" rx="20" ry="30" fill="#2d5016"/>
    </g>
    <g transform="translate(180, 25)">
      <line x1="0" y1="95" x2="0" y2="45" stroke="#4a2" stroke-width="5"/>
      <ellipse cx="0" cy="45" rx="22" ry="32" fill="#2d5016"/>
    </g>
    <g transform="translate(280, 30)">
      <line x1="0" y1="90" x2="0" y2="40" stroke="#4a2" stroke-width="5"/>
      <ellipse cx="0" cy="40" rx="20" ry="30" fill="#2d5016"/>
    </g>
    <g transform="translate(380, 25)">
      <line x1="0" y1="95" x2="0" y2="45" stroke="#4a2" stroke-width="5"/>
      <ellipse cx="0" cy="45" rx="22" ry="32" fill="#2d5016"/>
    </g>
    <g transform="translate(480, 30)">
      <line x1="0" y1="90" x2="0" y2="40" stroke="#4a2" stroke-width="5"/>
      <ellipse cx="0" cy="40" rx="20" ry="30" fill="#2d5016"/>
    </g>
    <g transform="translate(580, 25)">
      <line x1="0" y1="95" x2="0" y2="45" stroke="#4a2" stroke-width="5"/>
      <ellipse cx="0" cy="45" rx="22" ry="32" fill="#2d5016"/>
    </g>
    
    <!-- Understory -->
    <ellipse cx="130" cy="100" rx="15" ry="12" fill="#3a6" opacity="0.7"/>
    <ellipse cx="330" cy="100" rx="15" ry="12" fill="#3a6" opacity="0.7"/>
    <ellipse cx="530" cy="100" rx="15" ry="12" fill="#3a6" opacity="0.7"/>
    
    <!-- Labels -->
    <text x="350" y="140" text-anchor="middle" class="small">Pionierbäume schaffen Beschattung, Waldboden beginnt sich aufzubauen</text>
  </g>
  
  <!-- Stage 5: Climax Forest -->
  <g transform="translate(50, 780)">
    <rect x="0" y="0" width="700" height="180" fill="#f5f5f5" stroke="#ccc" stroke-width="2" rx="5"/>
    <text x="350" y="25" text-anchor="middle" class="stage-title">Stadium 5: Klimaxwald (100+ Jahre)</text>
    
    <!-- Soil -->
    <path d="M 50 150 L 650 150" fill="none" stroke="#8b6f47" stroke-width="4"/>
    
    <!-- Large trees -->
    <g transform="translate(80, 20)">
      <line x1="0" y1="130" x2="0" y2="50" stroke="#4a2" stroke-width="8"/>
      <ellipse cx="0" cy="50" rx="35" ry="45" fill="#2d5016"/>
    </g>
    <g transform="translate(200, 15)">
      <line x1="0" y1="135" x2="0" y2="55" stroke="#4a2" stroke-width="8"/>
      <ellipse cx="0" cy="55" rx="38" ry="48" fill="#2d5016"/>
    </g>
    <g transform="translate(320, 20)">
      <line x1="0" y1="130" x2="0" y2="50" stroke="#4a2" stroke-width="8"/>
      <ellipse cx="0" cy="50" rx="35" ry="45" fill="#2d5016"/>
    </g>
    <g transform="translate(440, 15)">
      <line x1="0" y1="135" x2="0" y2="55" stroke="#4a2" stroke-width="8"/>
      <ellipse cx="0" cy="55" rx="38" ry="48" fill="#2d5016"/>
    </g>
    <g transform="translate(560, 20)">
      <line x1="0" y1="130" x2="0" y2="50" stroke="#4a2" stroke-width="8"/>
      <ellipse cx="0" cy="50" rx="35" ry="45" fill="#2d5016"/>
    </g>
    
    <!-- Multiple layers -->
    <!-- Canopy -->
    <text x="650" y="40" text-anchor="end" class="small" fill="#2d5016">Kronendach</text>
    <!-- Subcanopy -->
    <ellipse cx="140" cy="90" rx="20" ry="25" fill="#3a6" opacity="0.7"/>
    <ellipse cx="380" cy="90" rx="20" ry="25" fill="#3a6" opacity="0.7"/>
    <text x="650" y="95" text-anchor="end" class="small" fill="#3a6">Unterschicht</text>
    <!-- Shrub layer -->
    <ellipse cx="260" cy="120" rx="15" ry="18" fill="#4a8" opacity="0.7"/>
    <ellipse cx="500" cy="120" rx="15" ry="18" fill="#4a8" opacity="0.7"/>
    <text x="650" y="125" text-anchor="end" class="small" fill="#4a8">Strauchschicht</text>
    <!-- Ground layer -->
    <rect x="60" y="140" width="580" height="10" fill="#5b5" opacity="0.5"/>
    <text x="650" y="148" text-anchor="end" class="small" fill="#5b5">Bodenschicht</text>
    
    <!-- Labels -->
    <text x="350" y="170" text-anchor="middle" class="small">Stabiles Ökosystem mit maximaler Biodiversität und Biomasse</text>
  </g>
  
  <!-- Time arrow -->
  <path d="M 30 100 L 30 960" fill="none" stroke="#333" stroke-width="2" marker-end="url(#timeArrow)"/>
  <defs>
    <marker id="timeArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
  </defs>
  <text x="20" y="530" text-anchor="middle" class="label" transform="rotate(-90 20 530)">Zeit →</text>
  
  <!-- Summary box -->
  <rect x="50" y="1000" width="700" height="80" fill="#f0f8ff" stroke="#4a90d9" stroke-width="2" rx="5"/>
  <text x="400" y="1025" text-anchor="middle" class="label" fill="#2d5016">Prinzip: Die Natur baut sich selbst auf</text>
  <text x="400" y="1045" text-anchor="middle" class="small">Jedes Stadium bereitet den Boden für das nächste</text>
  <text x="400" y="1065" text-anchor="middle" class="small">Pionierarten → Bodenaufbau → komplexere Arten → stabiles Ökosystem</text>
</svg>
